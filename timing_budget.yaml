# timing_budget.yaml — smoke-phase wall-clock budgets (seconds).
#
# Each smoke-<phase> mode must complete within the declared budget or
# backtest.py exits non-zero. The harness catches runtime regressions
# at smoke time (seconds) instead of during a 2h Saturday SF run.
#
# How to set budgets:
#   - Start generous (~50-100% headroom above typical) to absorb CI
#     variance + cold-start latency for ArcticDB + GBM downloads.
#   - Tighten over time as baseline runtimes stabilize.
#   - If a legitimate perf-improving feature shortens a smoke, LOWER the
#     budget in the same PR so future regressions can't silently creep
#     back up.
#   - If a legitimate feature genuinely needs more runtime, RAISE the
#     budget in the same PR with justification in the commit message.
#
# Budgets MISSING for a mode → soft-warn in logs; no hard fail.
# Budget EXCEEDED → SystemExit 2 with a loud message and context.
#
# ROADMAP Backtester P0 #3 "Per-phase smoke test harness" (2026-04-22).
#
# ── Calibration history ─────────────────────────────────────────────────────
#
# 2026-04-23 (initial PR #57): budgets set optimistically
#   (180 / 300 / 300 / 480) without empirical cold-spot data.
#
# 2026-04-23 (this PR, stopgap): first real smoke-only dry-run on a
# fresh c5.large spot revealed cold-start costs the initial budgets
# didn't account for. Observed smoke-simulate breakdown on full
# 911-ticker universe + 5-date cap:
#   - preflight: 141.6s (cold ArcticDB connect; 2nd invocation 103.6s)
#   - runtime_smoke: 2.3s
#   - simulation_setup: 196.5s  (full-universe ArcticDB bulk read)
#   - simulation_pipeline prelude (feature_maps precompute): ~182s
#   - simulate (actual sim loop, 5 dates × 911 tickers): 28.6s
#   - export_artifacts: 0.07s
#   Total: ~514s. Budget was 180s → SystemExit 2.
#
# Root cause: the smoke fixture caps `max_signal_dates=5` but does NOT
# filter the ticker axis, so ArcticDB bulk reads still pay full-universe
# cost. Fixing that (universe-filter knob wired into signal_loader /
# price_loader / load_precomputed_feature_maps) is the real fix — see
# the follow-up PR "universe-filter fixture for smoke modes".
#
# These budgets are STOPGAPS that unblock the harness on cold spots
# while the real fix ships. Once the universe-filter lands, budgets
# should drop to ~150-300s per mode and will be tightened in that PR.

smoke_budgets_seconds:
  # Universe-filter active: ArcticDB reads restricted to _SMOKE_FIXTURE_TICKERS
  # (5 tickers). Expected: preflight ~100-140s (cold) + runtime_smoke ~2s
  # + setup ~5-10s + simulate 2-5s + pipeline prelude ~5-10s ≈ 120-170s.
  # Headroom to 400s covers cold-spot variance + GBM / S3 latency spikes.
  smoke-simulate: 400.0

  # + 3-combo param sweep inner sim (~2-5s each, amortized feature maps)
  # + executor_optimizer rec compute. Estimated 130-200s typical.
  smoke-param-sweep: 500.0

  # preflight + predictor_data_prep (GBM inference 30-60 days × 5 tickers
  # is fast — the GBM download from S3 and scorer load dominate cold-
  # start tail) + feature_maps + single_run. Estimated 120-200s typical.
  smoke-predictor-backtest: 500.0

  # Above + 3 Phase 4 evaluators, each an inner full sim on 5 tickers.
  # Variant-model download + inference adds ~30-60s per evaluator.
  # Estimated 250-400s typical.
  smoke-phase4: 700.0

# ── Full-run hard caps (tripwire) ────────────────────────────────────────────
#
# Per-phase hard-cap watchdog for non-smoke runs. Exceeding the cap:
#   1. Dumps all-thread stack traces to stderr (via faulthandler)
#   2. Logs PHASE_TIMEOUT name=X cap_s=Y at WARNING level
#   3. Raises PhaseTimeoutError in the main thread so the pipeline
#      aborts fast instead of thrashing until the 2h SSM ceiling.
#
# Motivation: 2026-04-22 4th Saturday SF dry-run silently consumed 110
# minutes inside one of the Phase 4 evaluators with zero log output. The
# pipeline burned its full 2h budget before any diagnostic information
# was captured. A watchdog would have aborted at cap + dumped the stuck
# call stack, turning that incident from "2h of wasted compute, no clue"
# into "N minutes wasted + exact source location."
#
# Calibration philosophy:
#   - Set caps at ~2–3× observed typical runtime. Generous enough to
#     absorb cold-start + ArcticDB variance; tight enough to abort
#     before the SSM ceiling.
#   - Phase not in this block → no watchdog (opt-in per phase).
#   - A hit on these caps in a real run means either (a) a regression
#     to investigate or (b) the cap needs bumping with justification
#     in the PR commit message.
#   - The SSM execution timeout on spot runs is 7200s (2h). Every cap
#     here MUST be < 7200s, or the ceiling fires first.

full_run_hard_caps_seconds:
  # Phase 4a: 3 variant backtests (mse / rank / catboost).
  # Typical: 10–20 min. Cap at 45 min covers cold-start + ArcticDB tail.
  phase4a_ensemble_modes: 2700.0

  # Phase 4b: 7 threshold sims. Typical: 15–25 min. Cap at 60 min.
  phase4b_signal_thresholds: 3600.0

  # Phase 4c: single pruned sim. Typical: 5–10 min. Cap at 20 min.
  phase4c_feature_pruning: 1200.0

  # Predictor data prep (feature build + matrix) — post ohlcv pandas
  # refactor expected ~5–10 min. Cap at 30 min covers 911-ticker cold
  # ArcticDB read + GBM inference + indicator precompute.
  predictor_data_prep: 1800.0

  # Predictor-side pipeline (encompasses data_prep → inference → signal
  # generation → primary sim). Typical 10–20 min. Cap at 60 min.
  predictor_pipeline: 3600.0

  # Main simulation pipeline (signals → orders → vectorbt). Typical
  # 5–15 min for a single-run. Cap at 45 min.
  simulation_pipeline: 2700.0
